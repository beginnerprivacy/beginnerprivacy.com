{{ $question := .Get "question" }}
{{ $answer := .Get "answer" }}

<div class="faq-item">
  <button class="faq-question">{{ $question }}<span class="arrow">{{ partial "utils/icon.html" (dict "name" "plus" "attributes" "height=20") }}</span></button>
  <div class="faq-answer">
    <p>{{ $answer | markdownify }}</p>
  </div>
  <div class="faq-divider"></div>
</div>
